version: v1

plugins:
  - plugin: go
    out: internal/generated

  - plugin: go-grpc
    out: internal/generated

  - plugin: grpc-gateway
    out: internal/generated

  - plugin: openapiv2
    out: internal/generated/openapi
    opt:
      - allow_merge=true
      - merge_file_name=go_load
      - logtostderr=true